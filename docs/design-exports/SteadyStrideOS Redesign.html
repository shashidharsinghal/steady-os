<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f6f3ec" />
    <title>SteadyStrideOS — Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Default ink/paper palette — refined for a modern ops console */
        --paper: #f6f3ec;
        --paper-2: #efeae0;
        --ink: #14171c;
        --ink-2: #2a2f38;
        --muted: #6c7280;
        --line: #e2dccf;
        --line-strong: #cfc6b3;
        --card: #ffffff;
        --accent: #ff5b3a;     /* coral — bold accent */
        --accent-soft: #ffe4dc;
        --green: #3a7d4e;
        --green-soft: #d8ecdc;
        --amber: #b8862c;
        --amber-soft: #f4e7c1;
        --red: #c83a2c;
        --red-soft: #f6dbd5;
        --blue: #2a5cd6;
        --blue-soft: #dbe4f7;
        --violet: #5b3a9e;
        --violet-soft: #e4dbf3;
        --radius: 10px;
        --pad: 16px;
        --shadow: 0 1px 0 rgba(20, 23, 28, 0.04), 0 0 0 1px var(--line);
        --shadow-elev: 0 12px 32px -16px rgba(20, 23, 28, 0.18), 0 1px 0 rgba(20, 23, 28, 0.05);
      }
      [data-theme="dark"] {
        --paper: #0e1014;
        --paper-2: #14171c;
        --ink: #f1ece1;
        --ink-2: #c9c2b1;
        --muted: #8a8f9a;
        --line: #23272f;
        --line-strong: #2f343d;
        --card: #14171c;
        --accent: #ff7a5c;
        --accent-soft: #3a1d15;
        --green: #6dc188;
        --green-soft: #16291c;
        --amber: #e0b35a;
        --amber-soft: #2c2412;
        --red: #ed6e60;
        --red-soft: #2c1612;
        --blue: #6e94f0;
        --blue-soft: #161e34;
        --violet: #a48de0;
        --violet-soft: #1f1830;
        --shadow: 0 1px 0 rgba(0, 0, 0, 0.3), 0 0 0 1px var(--line);
        --shadow-elev: 0 16px 36px -18px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--line);
      }
      [data-card="flat"] { --shadow: 0 0 0 1px var(--line); --shadow-elev: 0 0 0 1px var(--line); }
      [data-card="bordered"] { --shadow: 0 0 0 1px var(--line-strong); --shadow-elev: 0 0 0 1px var(--line-strong); }
      [data-card="elevated"] {
        --shadow: 0 1px 0 rgba(20, 23, 28, 0.04), 0 6px 16px -8px rgba(20, 23, 28, 0.12), 0 0 0 1px var(--line);
        --shadow-elev: 0 18px 40px -18px rgba(20, 23, 28, 0.22), 0 0 0 1px var(--line);
      }
      [data-density="compact"] { --pad: 12px; }
      [data-density="cozy"] { --pad: 16px; }
      [data-density="comfy"] { --pad: 22px; }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Inter", system-ui, sans-serif;
        font-feature-settings: "ss01", "cv11";
        background: var(--paper);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }
      .mono { font-family: "JetBrains Mono", monospace; font-feature-settings: "tnum", "ss01"; }
      .serif { font-family: "Instrument Serif", serif; font-style: italic; letter-spacing: -0.01em; }
      .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid var(--paper); }
      ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

      button { font: inherit; color: inherit; cursor: pointer; }

      /* App shell */
      .app {
        display: grid;
        grid-template-columns: var(--sidebar-w, 248px) 1fr;
        min-height: 100vh;
        background: var(--paper);
      }
      [data-sidebar="rail"] .app { --sidebar-w: 64px; }

      /* Sidebar */
      .sidebar {
        position: sticky; top: 0; height: 100vh;
        background: linear-gradient(180deg, var(--paper-2), var(--paper));
        border-right: 1px solid var(--line);
        display: flex; flex-direction: column;
        overflow: hidden;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        min-height: 64px;
      }
      .brand-mark {
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--ink); color: var(--paper);
        display: grid; place-items: center;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .brand-mark svg { width: 18px; height: 18px; }
      .brand-text { display: flex; flex-direction: column; min-width: 0; }
      .brand-text .name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
      .brand-text .sub { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
      [data-sidebar="rail"] .brand-text { display: none; }
      [data-sidebar="rail"] .brand { justify-content: center; padding: 16px 8px; }

      .sidebar-section { padding: 12px 10px; }
      .sidebar-label {
        font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--muted); padding: 8px 12px 4px;
      }
      [data-sidebar="rail"] .sidebar-label { display: none; }

      .nav-item {
        display: flex; align-items: center; gap: 12px;
        padding: 8px 12px; margin: 1px 0;
        border-radius: 8px; cursor: pointer;
        color: var(--ink-2);
        font-size: 13px; font-weight: 500;
        text-decoration: none;
        position: relative;
      }
      .nav-item:hover { background: var(--paper-2); color: var(--ink); }
      .nav-item.active { background: var(--ink); color: var(--paper); }
      .nav-item .dot {
        margin-left: auto; font-size: 10px; padding: 2px 6px; border-radius: 999px;
        background: var(--paper-2); color: var(--muted);
        font-family: "JetBrains Mono", monospace;
      }
      .nav-item.active .dot { background: rgba(255,255,255,0.15); color: var(--paper); }
      .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
      [data-sidebar="rail"] .nav-item { justify-content: center; padding: 10px; }
      [data-sidebar="rail"] .nav-item .label { display: none; }
      [data-sidebar="rail"] .nav-item .dot { display: none; }

      .sidebar-footer {
        margin-top: auto;
        border-top: 1px solid var(--line);
        padding: 12px;
      }
      .user-pill {
        display: flex; align-items: center; gap: 10px;
        padding: 8px;
        border-radius: 10px;
        background: var(--paper-2);
        border: 1px solid var(--line);
      }
      .avatar {
        width: 30px; height: 30px; border-radius: 8px;
        background: var(--accent); color: white;
        display: grid; place-items: center;
        font-weight: 700; font-size: 12px;
        flex-shrink: 0;
      }
      .user-info { min-width: 0; flex: 1; }
      .user-info .n { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .user-info .r { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
      [data-sidebar="rail"] .user-info, [data-sidebar="rail"] .user-pill .icon-btn { display: none; }
      [data-sidebar="rail"] .user-pill { background: transparent; border: 0; padding: 0; justify-content: center; }

      .icon-btn {
        width: 28px; height: 28px;
        display: grid; place-items: center;
        border-radius: 6px; background: transparent; border: 0;
        color: var(--muted);
      }
      .icon-btn:hover { background: var(--paper); color: var(--ink); }

      /* Main content */
      .main { min-width: 0; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 20;
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        padding: 12px 28px;
        display: flex; align-items: center; gap: 16px;
        min-height: 64px;
      }
      .crumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
      .crumb .here { color: var(--ink); font-weight: 600; }
      .topbar-spacer { flex: 1; }

      .search {
        display: flex; align-items: center; gap: 8px;
        background: var(--paper-2); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 10px;
        min-width: 280px;
        color: var(--muted); font-size: 13px;
      }
      .search kbd {
        margin-left: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        background: var(--card);
        border: 1px solid var(--line);
        padding: 1px 5px; border-radius: 4px;
      }

      .content { padding: 24px 28px 64px; max-width: 1480px; width: 100%; }

      /* Cards */
      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: var(--pad);
      }
      .card.elev { box-shadow: var(--shadow-elev); }
      .card-head {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 12px;
      }
      .card-title {
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
        color: var(--muted); font-weight: 600;
      }
      .card-spacer { flex: 1; }

      /* Page heading */
      .page-head {
        display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
        padding-bottom: 20px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }
      .page-eyebrow {
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--accent); font-weight: 600;
      }
      .page-title {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 44px; line-height: 1; letter-spacing: -0.02em;
        margin: 6px 0 4px;
        font-weight: 400;
      }
      .page-sub { color: var(--muted); font-size: 14px; max-width: 560px; }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; }

      /* Buttons */
      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 12px;
        border-radius: 8px; border: 1px solid var(--line);
        background: var(--card); color: var(--ink);
        font-size: 13px; font-weight: 500;
        text-decoration: none;
      }
      .btn:hover { background: var(--paper-2); }
      .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
      .btn.primary:hover { background: var(--ink-2); }
      .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
      .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
      .btn.ghost:hover { background: var(--paper-2); }
      .btn.sm { padding: 4px 8px; font-size: 12px; }
      .btn.danger { color: var(--red); border-color: var(--red-soft); background: var(--red-soft); }

      /* Pills/badges */
      .pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600;
        background: var(--paper-2); color: var(--ink-2);
        border: 1px solid var(--line);
      }
      .pill.green { background: var(--green-soft); color: var(--green); border-color: transparent; }
      .pill.red { background: var(--red-soft); color: var(--red); border-color: transparent; }
      .pill.amber { background: var(--amber-soft); color: var(--amber); border-color: transparent; }
      .pill.blue { background: var(--blue-soft); color: var(--blue); border-color: transparent; }
      .pill.violet { background: var(--violet-soft); color: var(--violet); border-color: transparent; }
      .pill.solid-ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }

      /* Segmented control */
      .seg {
        display: inline-flex; padding: 3px;
        background: var(--paper-2); border-radius: 8px;
        border: 1px solid var(--line);
      }
      .seg button {
        padding: 4px 10px; border-radius: 6px;
        font-size: 12px; font-weight: 500; color: var(--muted);
        border: 0; background: transparent;
      }
      .seg button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }

      /* Table */
      table.t { width: 100%; border-collapse: collapse; }
      table.t th, table.t td { text-align: left; padding: 10px 12px; font-size: 13px; }
      table.t th {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
        color: var(--muted); font-weight: 600;
        border-bottom: 1px solid var(--line);
        background: var(--paper-2);
      }
      table.t tbody tr { border-bottom: 1px solid var(--line); }
      table.t tbody tr:hover { background: var(--paper-2); }
      table.t tbody tr:last-child { border-bottom: 0; }

      /* Grids */
      .row { display: grid; gap: 16px; }
      .row.cols-2 { grid-template-columns: 1fr 1fr; }
      .row.cols-3 { grid-template-columns: repeat(3, 1fr); }
      .row.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .row.cols-5 { grid-template-columns: repeat(5, 1fr); }
      .row.cols-12 { grid-template-columns: repeat(12, 1fr); }
      .span-3 { grid-column: span 3; }
      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-6 { grid-column: span 6; }
      .span-7 { grid-column: span 7; }
      .span-8 { grid-column: span 8; }
      .span-9 { grid-column: span 9; }

      .stack { display: flex; flex-direction: column; gap: 16px; }
      .stack-sm { display: flex; flex-direction: column; gap: 8px; }
      .row-flex { display: flex; align-items: center; gap: 8px; }
      .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

      .divider { height: 1px; background: var(--line); margin: 12px 0; }
      .vdivider { width: 1px; background: var(--line); align-self: stretch; }

      /* Stat */
      .stat-num { font-family: "Inter", sans-serif; font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
      .stat-num.lg { font-size: 44px; }
      .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 600; }
      .delta { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
      .delta.up { color: var(--green); }
      .delta.down { color: var(--red); }

      /* Sparkline */
      .spark { width: 100%; height: 40px; }

      /* Hairline */
      .hairline { height: 1px; background: var(--line); }

      .muted { color: var(--muted); }
      .small { font-size: 12px; }
      .xs { font-size: 11px; }

      /* Focus / form */
      input.text, select.sel {
        font: inherit; color: inherit;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 13px;
        width: 100%;
      }
      input.text:focus, select.sel:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px; border-color: transparent;
      }

      /* Bar chart bits */
      .bar-track { width: 100%; height: 6px; background: var(--paper-2); border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; background: var(--ink); border-radius: 999px; }

      /* Toolbar tab */
      .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
      .tab {
        padding: 8px 14px;
        font-size: 13px; font-weight: 500;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
      }
      .tab.active { color: var(--ink); border-color: var(--accent); }
      .tab:hover { color: var(--ink); }

      /* Checkbox */
      .ck {
        width: 16px; height: 16px; border-radius: 4px;
        border: 1.5px solid var(--line-strong);
        display: inline-grid; place-items: center;
        background: var(--card);
        flex-shrink: 0;
      }
      .ck.on { background: var(--ink); border-color: var(--ink); }
      .ck.on::after { content: ""; width: 8px; height: 4px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translate(1px, -1px); }

      /* Banner */
      .banner {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--paper-2);
        font-size: 13px;
      }
      .banner.warn { background: var(--amber-soft); border-color: transparent; color: var(--amber); }
      .banner.ok { background: var(--green-soft); border-color: transparent; color: var(--green); }
      .banner.error { background: var(--red-soft); border-color: transparent; color: var(--red); }

      /* Photo placeholder */
      .photo {
        position: relative;
        background: repeating-linear-gradient(
          135deg,
          var(--paper-2),
          var(--paper-2) 8px,
          var(--paper) 8px,
          var(--paper) 16px
        );
        color: var(--muted);
        display: grid; place-items: center;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        overflow: hidden;
      }

      /* Tooltip-style mini */
      .mini-card {
        border-radius: 8px; padding: 10px 12px;
        background: var(--paper-2);
        border: 1px solid var(--line);
      }

      /* Responsive */
      @media (max-width: 1100px) {
        .row.cols-5 { grid-template-columns: repeat(3, 1fr); }
        .row.cols-4 { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 900px) {
        body { font-size: 13px; }
        .app { grid-template-columns: 1fr; }
        .sidebar {
          position: fixed; top: 0; left: 0; right: 0; bottom: auto;
          height: auto; min-height: auto;
          flex-direction: row;
          border-right: 0; border-bottom: 1px solid var(--line);
          background: var(--paper);
          z-index: 30;
          overflow-x: auto; overflow-y: hidden;
        }
        .brand { border-bottom: 0; border-right: 1px solid var(--line); padding: 10px 14px; min-height: 56px; flex-shrink: 0; }
        .brand-mark { width: 28px; height: 28px; }
        .brand-text .name { font-size: 13px; }
        .brand-text .sub { display: none; }
        .sidebar-section { display: flex; padding: 8px; gap: 4px; flex: 1; flex-direction: row !important; overflow-x: auto; overflow-y: hidden; align-items: center; }
        .sidebar-label { display: none !important; }
        .nav-item { flex-shrink: 0; padding: 8px 12px; white-space: nowrap; margin: 0; }
        .nav-item .dot { display: none; }
        .sidebar-footer { display: none; }
        .main { margin-top: 56px; }
        .topbar { padding: 10px 14px; min-height: 52px; }
        .crumb { font-size: 12px; }
        .search { display: none; }
        .content { padding: 16px 14px 80px; }
        .page-head {
          flex-direction: column; align-items: stretch; gap: 14px;
          padding-bottom: 14px; margin-bottom: 18px;
        }
        .page-title { font-size: 30px; }
        .page-sub { font-size: 13px; }
        .actions { gap: 6px; }
        .btn { padding: 6px 10px; font-size: 12px; }
        .row { gap: 10px; }
        .row.cols-2, .row.cols-3, .row.cols-4, .row.cols-5 { grid-template-columns: 1fr; }
        .row.cols-12 > * { grid-column: 1 / -1; }
        .stat-num { font-size: 24px; }
        .stat-num.lg { font-size: 32px; }
        /* Tables → horizontal scroll */
        table.t { min-width: 600px; }
        .card { overflow-x: auto; }
        /* Hero ink card stacks */
        .card.elev > div[style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
        }
        /* Trend chart controls wrap */
        .seg button { padding: 4px 8px; font-size: 11px; }
        /* Tabs scroll */
        .tabs { overflow-x: auto; flex-wrap: nowrap; }
        .tab { white-space: nowrap; flex-shrink: 0; padding: 8px 10px; font-size: 12px; }
      }
      @media (max-width: 480px) {
        .page-title { font-size: 26px; }
        .content { padding: 12px 10px 80px; }
        .nav-item .label { display: none; }
        .nav-item { padding: 8px 10px; }
        .nav-icon { width: 18px; height: 18px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // tweak defaults — block must be valid JSON
      window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "module": "dashboard",
        "cardStyle": "elevated",
        "density": "cozy",
        "sidebar": "full",
        "theme": "light",
        "accent": "#2a5cd6"
      }/*EDITMODE-END*/;
    </script>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
